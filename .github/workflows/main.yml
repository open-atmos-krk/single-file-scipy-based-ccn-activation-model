name: main

defaults:
  run:
    shell: bash -ex {0}

on:
  push:
    branches: [ main ]
    paths-ignore: ['**.md']
  pull_request:
    branches: [ main ]
    paths-ignore: ['**.md']
  release:
    types: [published]

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - run: |
          pip install pre-commit
          pre-commit clean
          pre-commit autoupdate
          pre-commit run --all-files --show-diff-on-failure

  pytest:
    needs: precommit

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - run: pip install -e .
      - run: python -c "from ccnact import parcel"
      - run: pip install -e .[dev]
      - run: pytest ccnact.py

  package:
    needs: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5.0.0
        with:
          python-version: "3.13"
      - run: pip install twine build
      - run: python -m build 2>&1 | tee build.log
      # - run: exit `fgrep -i warning build.log | wc -l` TODO https://github.com/pypa/setuptools-scm/issues/1348
      - run: twine check --strict ./dist/*
      - name: check if version string does not contain PyPI-incompatible + char 
        run: |
          [ `ls ${{ matrix.packages-dir }}/dist | fgrep + | tee /dev/stderr | wc -l` -ne 0 ] && exit 1 || echo OK

      - uses: actions/upload-artifact@v4
        with:
          path: dist
          name: dist

  pkg_install_check:
    strategy:
      matrix:
        platform: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]
    runs-on: ${{ matrix.platform }}
    needs: [ package ]
    steps:
      - uses: actions/setup-python@v5.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          pattern: dist*
          merge-multiple: true
          path: dist
      - run: python -m pip install $PIP_INSTALL_ARGS dist/*.whl
      - run: python -c "import ccnact; print(ccnact.__version__)"

  publish:
    runs-on: ubuntu-latest
    needs: [ package, pkg_install_check ]
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist*
          merge-multiple: true
          path: dist

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: pypa/gh-action-pypi-publish@release/v1.14
        with:
          attestations: false
          repository_url: https://test.pypi.org/legacy/
          packages-dir: dist

      - if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1.14
        with:
          attestations: false
          packages-dir: dist
